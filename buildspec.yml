version: 0.2

phases:
  install:
    commands:
      - echo Installing...

  pre_build:
    commands:
      - echo Setting up SSH key...
      - echo "$EC2_SSH_KEY" | sed 's/\\n/\n/g' > key.pem
      - chmod 400 key.pem

      - echo printing SSH key...
      - cat key.pem

      - echo Logging in to DockerHub...
      - echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin

  build:
    commands:
      - docker build -t $DOCKER_USER/devops-app:latest .

  post_build:
    commands:
      - docker push $DOCKER_USER/devops-app:latest

      - echo Deploying...
      - 'ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@$EC2_IP "kubectl set image deployment/devops-app devops-app=$DOCKER_USER/devops-app:latest"'

